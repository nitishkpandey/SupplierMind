apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: suppliermind
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgis/postgis:16-3.4
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: suppliermind-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: suppliermind-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: suppliermind
          ports:
            - containerPort: 5432
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: postgres-storage
      volumes:
        - name: postgres-storage
          emptyDir: {}   # Use PersistentVolumeClaim in production
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: suppliermind
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
