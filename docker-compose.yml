version: "3.8"

services:

  # PostgreSQL + PostGIS
  # PostGIS adds geospatial functions (needed for radius search)
  postgres:
    image: postgis/postgis:16-3.4
    container_name: suppliermind_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-suppliermind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-suppliermind_dev}
      POSTGRES_DB: ${POSTGRES_DB:-suppliermind}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-suppliermind} -d ${POSTGRES_DB:-suppliermind}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis — Cache
  redis:
    image: redis:7-alpine
    container_name: suppliermind_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # etcd — Required by Milvus (do not interact with this directly)
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: suppliermind_etcd
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: >
      etcd
      --advertise-client-urls=http://127.0.0.1:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  # MinIO — Required by Milvus (do not interact with this directly)
  minio:
    image: minio/minio:RELEASE.2023-03-13T19-46-17Z
    container_name: suppliermind_minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Milvus — Vector Database
  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: suppliermind_milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 90s

volumes:
  postgres_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data: