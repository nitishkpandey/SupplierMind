# nginx.conf — Reverse proxy for production
# Routes /api/* to FastAPI backend, everything else to React frontend

events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    server {
        listen 80;

        # React frontend (built static files)
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;  # React router fallback
        }

        # FastAPI backend
        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;  # Agent pipeline can take 30s+
        }

        # Health check passthrough
        location /health {
            proxy_pass http://backend:8000/health;
        }

        # SSE needs special settings (no buffering)
        location /api/v1/queries/stream {
            proxy_pass http://backend:8000;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
        }
    }
}
